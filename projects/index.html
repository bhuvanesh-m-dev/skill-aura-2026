<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Aura 2026 - Innovation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }
        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-icon {
            transition: all 0.2s;
        }
        .btn-icon:hover {
            transform: scale(1.1);
        }
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }
        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 backdrop-blur-md bg-opacity-80">
        <div class="container mx-auto px-4 py-6 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-2 gradient-text">Skill Aura 2026</h1>
            <p class="text-slate-400 text-lg md:text-xl font-light tracking-wide">by Innovation Hub</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="projects-grid">
            <!-- Cards will be injected here by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-8 mt-12">
        <div class="container mx-auto px-4 text-center text-slate-500">
            <p>&copy; 2026 Innovation Hub. All rights reserved.</p>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast">URL copied to clipboard!</div>

    <script>
        const projects = [
            { name: "Techno Z4", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/techno-z4", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1f2722945-e8a0-4147-9359-c7ed7b12429a.png" },
            { name: "Team Blitz", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/team-blitz", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/168006b5e-3cb5-4127-a9fb-7a72d9f02c10.png" },
            { name: "Zen Crew", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/zen-crew", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1337779ad-b297-45ae-b64a-f62103081354.png" },
            { name: "Amos Payaluga", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/amos-payaluga", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1e85d0ec9-a071-4a00-a43a-216dac418de0.png" },
            { name: "Singam Squad", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/singam-squad", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1d871b6fd-6b2d-4e32-9873-5130fe32dd78.png" },
            { name: "Rolex", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/rolex", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1f2722945-e8a0-4147-9359-c7ed7b12429a.png" },
            { name: "Power Rangers", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/powerrangers", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/18255346e-2420-4c60-aaca-832af34dd695.png" },
            { name: "Phoenix Rise", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/pheonix-rise", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1e00facdd-0f74-4d67-afdd-2a9d2b60c5c7.png" },
            { name: "Amos Payaluga", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/amos-payaluga", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1e85d0ec9-a071-4a00-a43a-216dac418de0.png" },
            { name: "Nexatrons", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/nexatrons", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1f2722945-e8a0-4147-9359-c7ed7b12429a.png" },
            { name: "Karata Iruntha Parotta", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/karata-iruntha-parotta", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1e85d0ec9-a071-4a00-a43a-216dac418de0.png" },
            { name: "IT Warriors", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/it-warriors", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/135dd2bb7-0135-4aad-9384-acf7dbf2b63a.png" },
            { name: "GG Gang", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/gggang", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1e85d0ec9-a071-4a00-a43a-216dac418de0.png" },
            { name: "Game Changer", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/game-changer", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/18be9b9ae-e424-41b7-b5f7-c75f937ee262.png" },
            { name: "Flamigos", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/flamigos", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1e00facdd-0f74-4d67-afdd-2a9d2b60c5c7.png" },
            { name: "Destroyer", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/destroyer", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/1d871b6fd-6b2d-4e32-9873-5130fe32dd78.png" },
            { name: "Chess20", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/chess20", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/18be9b9ae-e424-41b7-b5f7-c75f937ee262.png" },
            { name: "BioSpark", url: "https://bhuvanesh-m-dev.github.io/skill-aura-2026/team/biospark", img: "https://image.qwenlm.ai/public_source/3d8ac146-5aa8-485d-891c-60cd2f92b585/143e7a82f-4c54-4ae1-89c3-9d2afa4d3ce9.png" }
        ];

        const grid = document.getElementById('projects-grid');
        const whatsappMessage = "Check out the project work done by our team!";

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("URL copied to clipboard!");
            }).catch(err => {
                console.error('Failed to copy: ', err);
                showToast("Failed to copy URL");
            });
        }

        function shareWhatsApp(url) {
            const encodedMessage = encodeURIComponent(whatsappMessage + " " + url);
            window.open(`https://wa.me/?text=${encodedMessage}`, '_blank');
        }

        async function universalShare(title, text, url) {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: title,
                        text: text,
                        url: url
                    });
                } catch (err) {
                    console.log('Share canceled or failed', err);
                }
            } else {
                // Fallback if Web Share API not supported
                copyToClipboard(url);
                showToast("Link copied! (Share not supported)");
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "toast show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function createCard(project) {
            const card = document.createElement('div');
            card.className = "bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700 card-hover transition-all duration-300 flex flex-col h-full";
            
            card.innerHTML = `
                <div class="h-48 overflow-hidden relative group">
                    <img src="${project.img}" alt="${project.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent opacity-60"></div>
                </div>
                <div class="p-6 flex flex-col flex-grow">
                    <h3 class="text-xl font-bold text-white mb-4 truncate">${project.name}</h3>
                    
                    <div class="mt-auto space-y-3">
                        <a href="${project.url}" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200">
                            View Project
                        </a>
                        
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="copyToClipboard('${project.url}')" class="btn-icon bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 px-2 rounded-lg flex items-center justify-center" title="Copy URL">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                            <button onclick="shareWhatsApp('${project.url}')" class="btn-icon bg-green-600 hover:bg-green-700 text-white py-2 px-2 rounded-lg flex items-center justify-center" title="Share on WhatsApp">
                                <i class="fa-brands fa-whatsapp"></i>
                            </button>
                            <button onclick="universalShare('${project.name}', '${whatsappMessage}', '${project.url}')" class="btn-icon bg-purple-600 hover:bg-purple-700 text-white py-2 px-2 rounded-lg flex items-center justify-center" title="Share">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        projects.forEach(project => {
            grid.appendChild(createCard(project));
        });
    </script>
    <img src="https://count.getloli.com/@bhuvanesh-m-dev?name=bhuvanesh-m-dev&theme=ai-1&padding=0&offset=0&align=top&scale=0.1&pixelated=1&darkmode=auto" width="1" height="1" alt="" style="position:absolute;visibility:hidden;" />
</body>
</html>
