            padding: 20px;
        }

        .container {
            max-width: 1200px;

            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .download-section {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e9ecef;
            color: #495057;
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        tbody tr:nth-child(even):hover {
            background: #e9ecef;
        }

        .team-name {
            font-weight: 600;
            color: #667eea;
            text-transform: capitalize;
        }

        .certificate-link {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .certificate-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-style: italic;
        }

        .stats {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            font-size: 14px;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .table-container {
                padding: 15px;
            }

            th, td {
                padding: 12px;
                font-size: 13px;
            }

            .search-box {
                max-width: 100%;
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

</head>

        const noResults = document.getElementById('noResults');
        const stats = document.getElementById('stats');

        function renderTable(data) {
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                noResults.style.display = 'block';
                stats.textContent = 'No records found';
                return;
            }
            
            noResults.style.display = 'none';
            
            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = 'fade-in';
                tr.style.animationDelay = `${index * 0.02}s`;
                
                tr.innerHTML = `
                    <td class="team-name">${escapeHtml(row.teamName)}</td>
                    <td>
                        <a href="${escapeHtml(row.certificateUrl)}" target="_blank" class="certificate-link">
                            ${escapeHtml(row.certificateUrl)}

                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                        </a>
                    </td>
                `;
                
                tableBody.appendChild(tr);
            });
            
            stats.textContent = `Showing ${data.length} of ${spreadsheetData.length} records`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function filterData(searchTerm) {
            const term = searchTerm.toLowerCase().trim();
            
            if (!term) {
                renderTable(spreadsheetData);
                return;
            }
            
            const filtered = spreadsheetData.filter(row => 
                row.teamName.toLowerCase().includes(term) ||
                row.certificateUrl.toLowerCase().includes(term)
            );
            
            renderTable(filtered);
        }

        searchInput.addEventListener('input', (e) => {
            filterData(e.target.value);
        });

        renderTable(spreadsheetData);
